<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light" />
    <meta name="supported-color-schemes" content="light" />
    <title>Street Surge | FLUX</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        color-scheme: light;
        supported-color-schemes: light;
      }

      /* Enforce light mode for clients that respect media queries */
      @media (prefers-color-scheme: dark) {
        .light-bg {
          background-image: linear-gradient(
            90deg,
            #f9fafb 0%,
            #f9fafc 100%
          ) !important;
        }
        .white-bg {
          background-image: linear-gradient(
            90deg,
            #ffffff 0%,
            #fffffe 100%
          ) !important;
        }
      }
    </style>
  </head>
  <body
    class="body"
    style="
      margin: 0;
      padding: 0;
      background-color: #f9fafb;
      font-family: &quot;Inter&quot;, sans-serif;
    "
  >
    <table
      width="100%"
      cellpadding="0"
      cellspacing="0"
      class="light-bg"
      style="
        background-color: #f9fafb;
        background-image: linear-gradient(90deg, #f9fafb 0%, #f9fafc 100%);
        padding: 32px 0;
      "
    >
      <tr>
        <td
          align="center"
          class="light-bg"
          style="
            background-color: #f9fafb;
            background-image: linear-gradient(90deg, #f9fafb 0%, #f9fafc 100%);
          "
        >
          <table
            width="480"
            cellpadding="0"
            cellspacing="0"
            class="light-bg"
            style="
              background-color: #f9fafb;
              background-image: linear-gradient(
                90deg,
                #f9fafb 0%,
                #f9fafc 100%
              );
              max-width: 480px;
              width: 100%;
            "
          >
            <tr>
              <td
                align="center"
                class="light-bg"
                style="
                  background-color: #f9fafb;
                  background-image: linear-gradient(
                    90deg,
                    #f9fafb 0%,
                    #f9fafc 100%
                  );
                  padding: 32px 0 0px;
                "
              >
                <a
                  style="text-decoration: none; display: block; cursor: default"
                >
                  <img
                    src="https://sst-asrivastava.github.io/Image-Repo/Mailer%20Creative__upper_V_final.jpg.jpeg"
                    alt="Street Surge | FLUX"
                    style="
                      width: 100%;
                      max-width: 480px;
                      display: block;
                      border-radius: 0;
                      border: none;
                    "
                  />
                </a>
              </td>
            </tr>

            <tr>
              <td
                align="center"
                background="https://sst-asrivastava.github.io/Image-Repo/Access%20Now%20btn_bg.jpg.jpeg"
                style="
                  background-image: url(&quot;https://sst-asrivastava.github.io/Image-Repo/Access%20Now%20btn_bg.jpg.jpeg&quot;);
                  background-repeat: no-repeat;
                  background-size: cover;
                  background-position: center;
                  padding: 28px 40px;
                "
              >
                <a
                  href="https://flux.streetsurge.in/signup"
                  style="display: inline-block; text-decoration: none"
                >
                  <img
                    src="https://sst-asrivastava.github.io/Image-Repo/Access%20Now_btn.png"
                    alt="Access Flux Now"
                    style="
                      display: block;
                      border: none;
                      width: 253px;
                      max-width: 100%;
                    "
                  />
                </a>
              </td>
            </tr>

            <tr>
              <td
                align="center"
                class="white-bg"
                style="
                  background-color: #ffffff;
                  background-image: linear-gradient(
                    90deg,
                    #ffffff 0%,
                    #fffffe 100%
                  );
                  padding: 0;
                  font-size: 0;
                  line-height: 0;
                "
              >
                <a
                  style="text-decoration: none; display: block; cursor: default"
                >
                  <img
                    src="https://sst-asrivastava.github.io/Image-Repo/mailer-bottom-v2.jpeg"
                    alt="Flux Advantages"
                    style="
                      width: 100%;
                      max-width: 480px;
                      display: block;
                      border: none;
                      vertical-align: top;
                    "
                  />
                </a>
              </td>
            </tr>

            <tr>
              <td
                align="center"
                background="https://sst-asrivastava.github.io/Image-Repo/Footer_bg.jpg.jpeg"
                style="
                  background-image: url(&quot;https://sst-asrivastava.github.io/Image-Repo/Footer_bg.jpg.jpeg&quot;);
                  background-repeat: no-repeat;
                  background-size: cover;
                  background-position: center;
                  padding: 18px 40px 28px;
                "
              >
                <p
                  style="
                    margin: 0;
                    font-size: 13px;
                    color: #1d7a9c;
                    font-family: &quot;Inter&quot;, sans-serif;
                    -webkit-text-fill-color: #1d7a9c;
                  "
                >
                  <a
                    href="https://www.streetsurge.in/"
                    class="footer-link"
                    style="
                      color: #1d7a9c;
                      text-decoration: none;
                      font-weight: 500;
                      -webkit-text-fill-color: #1d7a9c;
                    "
                    >www.streetsurge.in</a
                  >
                  &nbsp;&nbsp;<span
                    style="color: #1d7a9c; -webkit-text-fill-color: #1d7a9c"
                    >•</span
                  >&nbsp;&nbsp;
                  <a
                    href="https://www.linkedin.com/company/streetsurge/"
                    class="footer-link"
                    style="
                      color: #1d7a9c;
                      text-decoration: none;
                      font-weight: 500;
                      -webkit-text-fill-color: #1d7a9c;
                    "
                    >Linkedin</a
                  >
                </p>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
